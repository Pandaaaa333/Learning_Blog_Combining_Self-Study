name: Backend CI (Docker & .NET)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend_assignment_and_deadline_management_project/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend_assignment_and_deadline_management_project/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_assignment_and_deadline_management_project

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run Tests
        run: dotnet test --no-build -c Release

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Verify)
        uses: docker/build-push-action@v6
        with:
          context: backend_assignment_and_deadline_management_project
          file: backend_assignment_and_deadline_management_project/Dockerfile
          push: false
          tags: backend-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
