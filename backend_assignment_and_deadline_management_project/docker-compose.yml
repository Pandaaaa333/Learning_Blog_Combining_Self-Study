services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: study-management-db
    restart: always
    environment:
      POSTGRES_DB: StudyManagementDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sixpaths456123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-management-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=StudyManagementDb;Username=postgres;Password=sixpaths456123
      - JWT__Key=ThisIsAVerySecretKeyForJWTSigning1234567890
      - JWT__Issuer=StudyManagementApi
      - JWT__Audience=StudyManagementApp
    depends_on:
      - db
    # Không cần export ports ra host vì đã qua Nginx

  # 3. Nginx Reverse Proxy Service
  nginx:
    image: nginx:alpine
    container_name: study-management-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # 4. MinIO Object Storage Service
  minio:
    image: minio/minio
    container_name: study-management-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
