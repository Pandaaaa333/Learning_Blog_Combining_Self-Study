services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: study-management-db
    restart: always
    environment:
      - POSTGRES_DB=StudyManagementDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sixpaths456123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Backend API Service
  backend:
    build:
      context: ./backend_assignment_and_deadline_management_project
      dockerfile: Dockerfile
    container_name: study-management-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=StudyManagementDb;Username=postgres;Password=sixpaths456123
      - JWT__Key=ThisIsAVerySecretKeyForJWTSigning1234567890
      - JWT__Issuer=StudyManagementApi
      - JWT__Audience=StudyManagementApp
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadminpassword
      - Minio__BucketName=study-management
      - Minio__UseSSL=false
    depends_on:
      - db
      - minio

  # 3. MinIO Object Storage
  minio:
    image: minio/minio
    container_name: study-management-minio
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 4. Nginx Reverse Proxy Service for Backend
  nginx-backend:
    image: nginx:alpine
    container_name: study-management-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./backend_assignment_and_deadline_management_project/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # 5. React Web Frontend Service
  react-frontend:
    build:
      context: ./web-frontend-assignment-and-deadline-management
      dockerfile: Dockerfile
    container_name: study-management-react-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # 6. Flutter Web App Service
  flutter-web:
    build:
      context: ./assignment_and_deadline_management_project
      dockerfile: Dockerfile
    container_name: study-management-flutter-web
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
